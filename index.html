<!DOCTYPE html>
<html>
<head>
    <title>Guessing Game</title>

<body>

    <p>I'm thinking of a number between 1 and 100.</p>

    <input type="number" id="guessInput" min="1" max="100">

    <p id="message"></p>

    <script src="script.js"></script>
</body>
</html>
